name: cmrit_vault_mobile
description: CMRIT Vault mobile app.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  lottie: ^3.2.0
  http: ^1.2.2
  url_launcher: ^6.3.0
  file_picker: ^8.1.2
  shared_preferences: ^2.3.2
  syncfusion_flutter_pdfviewer: ^33.1.46
  sentry_flutter: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/appIcon.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/appIcon.png
    - assets/banner1.png
    - assets/banner2.png
    - assets/banner3.png
    - assets/loading.json
